<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flove Performance Diagnostic — Find Your Protocol</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      background: #F8F4EE;
      font-family: 'Inter', sans-serif;
      color: #1C1828;
      margin: 0;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
      letter-spacing: -0.02em;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeSlideOut {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-10px); }
    }
    @keyframes progressGrow {
      from { width: var(--prev-w, 0%); }
      to   { width: var(--target-w); }
    }

    .screen-enter { animation: fadeSlideIn 0.28s cubic-bezier(0.22,1,0.36,1) both; }
    .screen-exit  { animation: fadeSlideOut 0.18s ease-in both; pointer-events: none; }

    /* ── PROGRESS BAR ── */
    #progress-track {
      height: 3px;
      background: #EDE6F4;
      border-radius: 100px;
      overflow: hidden;
    }
    #progress-fill {
      height: 100%;
      background: #8B72CC;
      border-radius: 100px;
      transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── OPTION BUTTON ── */
    .opt-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 15px 18px;
      background: #FFFFFF;
      border: 1.5px solid #EDE6F4;
      border-radius: 12px;
      cursor: pointer;
      text-align: left;
      box-shadow: 0 1px 4px rgba(139,114,204,0.05);
      transition: border-color 0.15s ease, background-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .opt-btn:hover {
      border-color: #B8A0E0;
      box-shadow: 0 3px 12px rgba(139,114,204,0.1);
      transform: translateY(-1px);
    }
    .opt-btn:active { transform: scale(0.985); }
    .opt-btn.selected {
      border-color: #8B72CC;
      background: #F3EEFF;
      box-shadow: 0 3px 14px rgba(139,114,204,0.14);
    }

    .opt-indicator {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #D4C8EE;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .opt-btn.multi .opt-indicator { border-radius: 6px; }
    .opt-btn.selected .opt-indicator {
      background: #8B72CC;
      border-color: #8B72CC;
    }

    /* ── CTA BUTTON ── */
    .cta {
      background: #1C1828;
      color: #FFFFFF;
      border: none;
      border-radius: 100px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.01em;
      padding: 16px 28px;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(28,24,40,0.22);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .cta:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(28,24,40,0.3); }
    .cta:active { transform: translateY(0); }
    .cta:disabled { opacity: 0.38; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── BACK BUTTON ── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      font-weight: 500;
      color: #9B8EC0;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      transition: color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .back-btn:hover { color: #1C1828; }

    /* ── BADGE ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #F3EEFF;
      color: #8B72CC;
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    /* ── EMAIL INPUT ── */
    .email-input {
      width: 100%;
      padding: 16px 20px;
      background: #FFFFFF;
      border: 1.5px solid #EDE6F4;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      color: #1C1828;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .email-input::placeholder { color: #B8B0C8; }
    .email-input:focus {
      border-color: #8B72CC;
      box-shadow: 0 0 0 3px rgba(139,114,204,0.1);
    }
    .email-input.error { border-color: #D95050; }

    /* ── CARD ── */
    .card {
      background: #FFFFFF;
      border: 1.5px solid #EDE6F4;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(139,114,204,0.07);
    }

    /* ── CHECKMARK SVG ── */
    .chk { display: none; }
    .opt-btn.selected .chk { display: block; }
    .opt-btn.selected .chk-empty { display: none; }
  </style>
</head>
<body class="min-h-screen">

<div id="app"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────────────────────────────────────

const Q = [
  // Block 1 — Identity Validation
  { id:'q1',  num:1,  block:1, type:'single',
    q: 'How often do you train?',
    opts: ['1–2x per week', '3–4x per week', '5+ per week', 'Daily'] },

  { id:'q2',  num:2,  block:1, type:'single',
    q: "What's your training style?",
    opts: ['Weightlifting / strength training', 'HIIT / functional fitness', 'Pilates / barre', 'Mixed cardio + lifting', 'Other'] },

  { id:'q3',  num:3,  block:1, type:'single',
    q: 'Are you tracking your macros?',
    opts: ['Yes, daily', 'Sometimes', 'No, but I eat clean', 'No'] },

  { id:'q4',  num:4,  block:1, type:'single',
    q: "What's your daily protein target?",
    opts: ['Under 80g', '80–120g', '120–160g', '160g+'] },

  { id:'q5',  num:5,  block:1, type:'multi',
    q: "Which of these are in your current stack?",
    sub: 'Select all that apply',
    opts: ['Pre-workout', 'Whey protein', 'Protein bars', 'BCAAs / EAAs', 'Greens powder', 'Creatine', 'None of these'] },

  // Block 2 — Symptom + Failure Mapping
  { id:'q6',  num:6,  block:2, type:'single',
    q: 'When does bloating hit you hardest?',
    opts: ['After protein shakes', 'Mid-workout', 'Afternoon / evening even when eating clean', 'After "healthy" foods', "It's constant"] },

  { id:'q7',  num:7,  block:2, type:'multi',
    q: 'How does the bloating affect you?',
    sub: 'Select all that apply',
    opts: ['My abs disappear for hours', 'I look pregnant in my gym clothes', 'I cancel plans because of it', 'I avoid progress photos', 'It ruins my workouts'] },

  { id:'q8',  num:8,  block:2, type:'single',
    q: 'Have you tried probiotics before?',
    opts: ["Yes, multiple brands — didn't help", "Yes, one brand — didn't help", 'Yes, but they gave me side effects (gas, cramps, reflux)', 'No, never tried'] },

  { id:'q9',  num:9,  block:2, type:'multi',
    q: "Which of these have you tried for bloat?",
    sub: 'Select all that apply',
    opts: ['Greens powders (AG1, Bloom, etc.)', 'Detox / laxative teas', 'Cutting protein or dairy', 'ACV gummies', 'Intermittent fasting', 'Standard OTC probiotics', 'None of these'] },

  // Block 3 — Forward-Looking Calibration
  { id:'q10', num:10, block:3, type:'multi', maxSel: 3,
    q: "What's your top goal right now?",
    sub: 'Select up to 3',
    opts: ['Visible abs / muscle definition', 'Flat stomach all day', 'Stop bloating from protein shakes', 'Feel confident in gym clothes', 'Better overall digestion'] },

  { id:'q11', num:11, block:3, type:'single',
    q: 'How committed are you to a daily routine?',
    opts: ["Very — I'll do it morning and night if it works", 'Pretty committed — once a day max', 'I need it to be simple'] },

  { id:'q12', num:12, block:3, type:'single',
    q: 'How many hours of sleep do you usually get?',
    opts: ['7+', '5–7', 'Under 5'] },
];

// Build the full flow
const FLOW = [
  { type: 'intro' },
  ...Q.slice(0, 5).map(q => ({ type: 'question', q })),    // Q1–Q5
  ...Q.slice(5, 9).map(q => ({ type: 'question', q })),    // Q6–Q9
  { type: 'interval' },
  ...Q.slice(9, 12).map(q => ({ type: 'question', q })),   // Q10–Q12
  { type: 'email' },
  { type: 'results' },
];

const BLOCK_LABEL = { 1: 'Profile', 2: 'Symptoms', 3: 'Goals' };

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────

let step = 0;
let answers = {};
let multiSel = new Set();
let transitioning = false;

// ─────────────────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────────────────

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function checkSVG() {
  return `<svg class="chk" width="12" height="9" viewBox="0 0 12 9" fill="none">
    <path d="M1 4.5L4.5 8L11 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function progress() {
  const answered = FLOW.slice(0, step).filter(s => s.type === 'question').length;
  return Math.round((answered / 12) * 100);
}

// ─────────────────────────────────────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────────────────────────────────────

function goTo(newStep) {
  if (transitioning) return;
  transitioning = true;

  const el = document.querySelector('.quiz-screen');
  if (el) {
    el.classList.remove('screen-enter');
    el.classList.add('screen-exit');
    setTimeout(() => {
      step = newStep;
      multiSel = new Set(answers[FLOW[step]?.q?.id] || []);
      render();
      transitioning = false;
    }, 160);
  } else {
    step = newStep;
    multiSel = new Set();
    render();
    transitioning = false;
  }
}

function next() { goTo(step + 1); }
function back() { if (step > 1) goTo(step - 1); }

// ─────────────────────────────────────────────────────────────────────────────
// ANSWER HANDLERS
// ─────────────────────────────────────────────────────────────────────────────

function pickSingle(qId, value) {
  if (transitioning) return;
  answers[qId] = value;

  // Highlight then advance
  document.querySelectorAll('.opt-btn').forEach(btn => {
    if (btn.dataset.val === value) btn.classList.add('selected');
  });
  setTimeout(next, 300);
}

function toggleOpt(btn, qId, value, maxSel) {
  if (multiSel.has(value)) {
    multiSel.delete(value);
    btn.classList.remove('selected');
    const ind = btn.querySelector('.opt-indicator');
    ind.innerHTML = '';
  } else {
    if (maxSel && multiSel.size >= maxSel) return;
    multiSel.add(value);
    btn.classList.add('selected');
    const ind = btn.querySelector('.opt-indicator');
    ind.innerHTML = `<svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4.5L4.5 8L11 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  }

  const continueBtn = document.getElementById('multi-btn');
  if (continueBtn) continueBtn.disabled = multiSel.size === 0;
}

function submitMulti(qId) {
  if (multiSel.size === 0) return;
  answers[qId] = [...multiSel];
  next();
}

function submitEmail() {
  const input = document.getElementById('email-field');
  const errEl = document.getElementById('email-err');
  const val = input.value.trim();

  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) {
    input.classList.add('error');
    errEl.style.display = 'block';
    return;
  }

  input.classList.remove('error');
  errEl.style.display = 'none';
  answers.email = val;
  next();
}

// ─────────────────────────────────────────────────────────────────────────────
// SCREEN RENDERERS
// ─────────────────────────────────────────────────────────────────────────────

function renderIntro() {
  return `
<div class="quiz-screen screen-enter min-h-screen flex flex-col" style="max-width:480px; margin:0 auto;">

  <!-- Logo -->
  <div style="padding:20px 24px 0; display:flex; justify-content:center;">
    <a href="/" style="font-family:'Playfair Display',serif; font-size:22px; font-weight:700; color:#1C1828; text-decoration:none; letter-spacing:-0.02em;">flove.</a>
  </div>

  <!-- Body -->
  <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px 48px; text-align:center;">

    <div class="badge" style="margin-bottom:20px;">
      <span style="width:6px;height:6px;background:#8B72CC;border-radius:50%;"></span>
      Performance Diagnostic
    </div>

    <h1 style="font-size:clamp(28px,7vw,42px); font-weight:700; line-height:1.15; margin:0 0 16px;">
      Your gut isn't broken.<br>Your stack might be.
    </h1>

    <p style="font-size:15px; line-height:1.75; color:#5A5370; max-width:360px; margin:0 0 36px;">
      This 3-minute assessment maps your training profile and supplement chemistry to pinpoint the exact cause of your bloating — and build a protocol to fix it.
    </p>

    <!-- Authority logos -->
    <div style="display:flex; align-items:center; justify-content:center; gap:20px; margin-bottom:40px; opacity:0.35;">
      <span style="font-size:11px; font-weight:800; letter-spacing:0.08em; color:#1C1828;">HEALTHLINE</span>
      <span style="width:3px;height:3px;background:#9B8EC0;border-radius:50%;"></span>
      <span style="font-size:11px; font-weight:800; letter-spacing:0.08em; color:#1C1828;">WOMEN'S HEALTH</span>
      <span style="width:3px;height:3px;background:#9B8EC0;border-radius:50%;"></span>
      <span style="font-size:11px; font-weight:800; letter-spacing:0.08em; color:#1C1828;">NCBI</span>
    </div>

    <button class="cta" style="width:100%; max-width:360px;" onclick="next()">
      Start My Assessment →
    </button>

    <p style="font-size:12px; color:#AEA5C8; margin-top:14px; line-height:1.5;">
      3 minutes · 12 questions · 100% free
    </p>
  </div>
</div>`;
}

function renderQuestion() {
  const { q } = FLOW[step];
  const isSingle = q.type === 'single';
  const prev = answers[q.id];

  // Restore multi-select state when navigating back
  if (!isSingle && prev) multiSel = new Set(prev);

  const pct = progress();

  const opts = q.opts.map(opt => {
    const isSelected = isSingle ? prev === opt : multiSel.has(opt);
    const indicatorContent = isSelected
      ? `<svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4.5L4.5 8L11 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`
      : '';
    const clickHandler = isSingle
      ? `onclick="pickSingle('${q.id}', this.dataset.val)"`
      : `onclick="toggleOpt(this, '${q.id}', this.dataset.val, ${q.maxSel || 'null'})"`;
    return `
    <button class="opt-btn${isSingle ? '' : ' multi'}${isSelected ? ' selected' : ''}"
      data-val="${esc(opt)}"
      ${clickHandler}>
      <span class="opt-indicator" style="${!isSingle ? 'border-radius:6px;' : ''}">${indicatorContent}</span>
      <span style="font-size:14px; font-weight:500; line-height:1.45; color:#1C1828;">${esc(opt)}</span>
    </button>`;
  }).join('');

  return `
<div class="quiz-screen screen-enter min-h-screen flex flex-col" style="max-width:480px; margin:0 auto;">

  <!-- Sticky header -->
  <div style="position:sticky; top:0; z-index:10; background:#F8F4EE; padding:16px 20px 14px;">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
      <button class="back-btn" onclick="back()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 13L5 8l5-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back
      </button>
      <span style="font-size:12px; color:#AEA5C8; font-weight:500;">Question ${q.num} of 12</span>
      <span class="badge" style="font-size:10px; padding:4px 10px;">${BLOCK_LABEL[q.block]}</span>
    </div>
    <div id="progress-track">
      <div id="progress-fill" style="width:${pct}%;"></div>
    </div>
  </div>

  <!-- Question + options -->
  <div style="flex:1; display:flex; flex-direction:column; padding:24px 20px 32px;">
    ${q.sub ? `<p style="font-size:11px; font-weight:700; color:#8B72CC; letter-spacing:0.08em; text-transform:uppercase; margin:0 0 8px;">${q.sub}</p>` : ''}
    <h2 style="font-size:clamp(19px,4.5vw,24px); font-weight:600; line-height:1.3; margin:0 0 22px;">${q.q}</h2>

    <div style="display:flex; flex-direction:column; gap:10px; flex:1;">
      ${opts}
    </div>

    ${!isSingle ? `
    <div style="padding-top:24px;">
      <button id="multi-btn" class="cta" style="width:100%;"
        onclick="submitMulti('${q.id}')"
        ${multiSel.size === 0 ? 'disabled' : ''}>
        Continue →
      </button>
    </div>` : ''}
  </div>
</div>`;
}

function renderInterval() {
  return `
<div class="quiz-screen screen-enter min-h-screen flex flex-col" style="max-width:480px; margin:0 auto;">

  <!-- Progress -->
  <div style="padding:16px 20px 14px;">
    <div id="progress-track">
      <div id="progress-fill" style="width:75%;"></div>
    </div>
  </div>

  <!-- Content -->
  <div style="flex:1; display:flex; flex-direction:column; padding:12px 20px 40px;">

    <div style="display:inline-flex; align-items:center; gap:8px; background:#FFF3E0; border:1px solid #FFD98C; border-radius:100px; padding:6px 14px; align-self:flex-start; margin-bottom:24px;">
      <span style="font-size:14px;">⚠</span>

    <h2 style="font-size:clamp(24px,6vw,34px); font-weight:700; line-height:1.2; margin:0 0 22px;">

    <!-- Mechanism card -->
    <div class="card" style="padding:22px; margin-bottom:18px;">

      </p>
      <p style="font-size:14px; line-height:1.75; color:#3D3355; margin:0;">

      </p>
    </div>

    <!-- Lift quote -->
    <div style="background:linear-gradient(135deg,#F3EEFF,#EAE0F8); border-left:3px solid #8B72CC; border-radius:0 12px 12px 0; padding:18px 20px; margin-bottom:18px;">
      <p style="font-size:15px; font-weight:600; line-height:1.55; color:#1C1828; margin:0; font-style:italic;">
        "This isn't a willpower problem. It's a chemistry problem — and it's specifically fixable."
      </p>
    </div>

    <!-- Authority signal -->
    <div class="card" style="display:flex; align-items:flex-start; gap:12px; padding:16px; margin-bottom:32px;">
      <span style="width:34px; height:34px; background:#F3EEFF; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:16px;">🧬</span>
      <p style="font-size:13px; line-height:1.65; color:#5A5370; margin:0;">
        <strong style="color:#1C1828;">MAKTREK® Bi-Pass Technology</strong> is the only clinically validated marine-derived delivery system engineered for high-protein training stacks — delivering <strong style="color:#1C1828;">50%+ bacterial survival</strong> vs. 0.003% for standard powders.
      </p>
    </div>

    <button class="cta" style="width:100%; margin-bottom:14px;" onclick="next()">
      Let's Personalize Your Protocol →
    </button>

    <p style="font-size:12px; color:#AEA5C8; text-align:center; margin:0;">3 quick questions left</p>
  </div>
</div>`;
}

function renderEmail() {
  return `
<div class="quiz-screen screen-enter min-h-screen flex flex-col" style="max-width:480px; margin:0 auto;">

  <!-- Progress -->
  <div style="padding:16px 20px 14px;">
    <div id="progress-track">
      <div id="progress-fill" style="width:96%;"></div>
    </div>
  </div>

  <div style="flex:1; display:flex; flex-direction:column; align-items:center; padding:16px 24px 48px;">

    <!-- Icon -->
    <div style="width:64px;height:64px;background:#F3EEFF;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:22px;">📋</div>

    <h2 style="font-size:clamp(22px,5.5vw,30px); font-weight:700; line-height:1.2; text-align:center; margin:0 0 12px; max-width:340px;">
      One step left — where should we send your protocol?
    </h2>

    <p style="font-size:14px; line-height:1.7; color:#5A5370; text-align:center; max-width:320px; margin:0 0 28px;">
      Your protocol is built against your specific training profile and supplement stack.
    </p>

    <!-- Lead magnet callout -->
    <div class="card" style="padding:16px 18px; margin-bottom:24px; width:100%;">
      <div style="display:flex; align-items:flex-start; gap:12px;">
        <span style="font-size:20px; flex-shrink:0; margin-top:1px;">🎁</span>
        <div>
